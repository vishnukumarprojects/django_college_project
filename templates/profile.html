<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFILE</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="icon" href="../static/company_logos/maruthi.png">
    <style>

          body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        .login{
            text-align: center;
            margin-left: 500px;
            margin-right: 500px;
            margin-top: 100px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            margin-top: 20px;
            padding:70px;
            border-radius: 5px;
        }
        input{
            width:150px;
            height:20px;
            border-radius:5px;
            border-color: lavender;
        }
        label{
            font-size: 14px;
        }
        button{
            width: 130px;
            height: 50px;
            background-color:lemonchiffon;
            border: 4px solid dimgrey;
            border-radius: 6px;
        
            
        }
    </style>
</head>
<body>
    <div class="indexheader">
        <h1>GSD CARS </h1>
   </div>
    
   <div class="nav">
    <ul>
     <li><a href="/profile">My profile</a></li>
    
     <li><a href="/contact">Contact Us</a></li>
     
     <li><a href="/companys">Book Now</a></li>
     
     <li><a href="{% url 'index' %}">Home</a></li>

     <div class="logo">
        <img src="../static/car_images/company_logo.png" style="width:70px; height:70px; border-radius: 70px; margin-left: 10px;">
         </div> 
    </ul>
</div>


    <form id="login" method="POST" action="/profile">
        {% csrf_token %}
        <div class="login">
            <h2 style="color: blue; ">BOOKING STATUS</h2>
            <br>
            {% for i in messages %}
            {% if 'failed' in i.tags %}
            <h4 style="color: red">{{i}}</h4>
            {% endif %}
            {% endfor %}
            <br>
            <label>Booking No:
                
            </label>

            <input type="text" placeholder="Booking Number" name="booking_number">
             <br>
             <br>
             <br>
            <label>Email ID:
                
    
            </label>
            <input type="text" placeholder="Email ID" name="email_id">
            <br>
            <br>
            <br>
            <br>
            <button type="submit"><b>Submit</b></button>
        </div>
    


       
    </form>
    
</body>
</html>
